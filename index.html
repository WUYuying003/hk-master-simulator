<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="港硕模拟器">
<meta name="theme-color" content="#0a0e1a">
<title>🎓 港硕模拟器 — 你的香港留学生存指南</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');

  :root {
    --bg-primary: #0a0e1a;
    --bg-secondary: #111827;
    --bg-card: #1a2236;
    --bg-hover: #243049;
    --accent-gold: #f6c547;
    --accent-blue: #60a5fa;
    --accent-purple: #a78bfa;
    --accent-pink: #f472b6;
    --accent-green: #34d399;
    --accent-red: #f87171;
    --accent-orange: #fb923c;
    --text-primary: #f1f5f9;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --border-color: #1e293b;
    --shadow-glow: 0 0 20px rgba(246,197,71,0.15);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }

  /* === Background Animation === */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(96,165,250,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(167,139,250,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 80%, rgba(244,114,182,0.06) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  #app {
    position: relative;
    z-index: 1;
    max-width: 1000px;
    margin: 0 auto;
    padding: 20px;
    min-height: 100vh;
  }

  /* === Screen Transitions === */
  .screen {
    display: none;
    animation: fadeIn 0.5s ease;
  }
  .screen.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-30px); }
    to { opacity: 1; transform: translateX(0); }
  }

  @keyframes pulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  @keyframes shimmer {
    0% { background-position: -200% center; }
    100% { background-position: 200% center; }
  }

  @keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  /* === Title Screen === */
  .title-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 90vh;
    text-align: center;
  }

  .title-logo {
    font-size: 72px;
    margin-bottom: 10px;
    animation: float 3s ease-in-out infinite;
  }

  .title-main {
    font-size: 48px;
    font-weight: 900;
    background: linear-gradient(135deg, var(--accent-gold), var(--accent-orange), var(--accent-pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
    letter-spacing: 4px;
  }

  .title-sub {
    font-size: 18px;
    color: var(--text-secondary);
    margin-bottom: 40px;
    font-weight: 300;
    letter-spacing: 2px;
  }

  .title-desc {
    max-width: 500px;
    color: var(--text-muted);
    font-size: 14px;
    line-height: 1.8;
    margin-bottom: 50px;
  }

  .btn-start {
    padding: 16px 60px;
    font-size: 20px;
    font-weight: 700;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, var(--accent-gold), var(--accent-orange));
    color: #000;
    cursor: pointer;
    letter-spacing: 2px;
    transition: all 0.3s ease;
    box-shadow: 0 4px 30px rgba(246,197,71,0.3);
  }
  .btn-start:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 40px rgba(246,197,71,0.5);
  }

  /* === Game Top Bar === */
  .lang-toggle {
    position: fixed;
    top: 12px;
    right: 12px;
    z-index: 50;
    display: flex;
    gap: 2px;
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    padding: 2px;
  }
  .lang-btn {
    padding: 3px 10px;
    font-size: 11px;
    font-weight: 600;
    border: none;
    border-radius: 6px;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
  }
  .lang-btn:hover { color: var(--text-primary); }
  .lang-btn.active {
    background: var(--accent-gold);
    color: #000;
  }

  .game-topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 14px;
    background: var(--bg-secondary);
    border-radius: 10px;
    border: 1px solid var(--border-color);
    margin-bottom: 8px;
  }
  .topbar-left { display: flex; gap: 10px; align-items: center; }
  .topbar-time { font-weight: 700; font-size: 14px; color: var(--accent-gold); }
  .topbar-progress { font-size: 11px; color: var(--text-muted); }
  .topbar-badges { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .topbar-badge {
    display: flex; align-items: center; gap: 3px;
    padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 600;
    background: rgba(255,255,255,0.04); border: 1px solid var(--border-color);
  }

  /* === Game Body (left stats + center activities) === */
  .game-body {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
  }

  /* === Left Side Stats === */
  .side-stats {
    width: 100px;
    flex-shrink: 0;
    background: var(--bg-secondary);
    border-radius: 10px;
    border: 1px solid var(--border-color);
    padding: 8px 6px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .side-stat { display: flex; flex-direction: column; gap: 1px; }
  .side-stat-header { display: flex; justify-content: space-between; align-items: center; }
  .side-stat-label { font-size: 9px; color: var(--text-muted); display: flex; align-items: center; gap: 2px; }
  .side-stat-label span { font-size: 10px; }
  .side-stat-val { font-size: 10px; font-weight: 700; }
  .side-stat-bar { height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
  .side-stat-bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }

  /* === Center Activities (3 columns, always visible) === */
  .center-activities {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
    align-content: start;
  }
  .act-column {
    background: var(--bg-secondary);
    border-radius: 10px;
    border: 1px solid var(--border-color);
    overflow: hidden;
  }
  .act-col-header {
    padding: 5px 8px;
    font-size: 11px;
    font-weight: 700;
    text-align: center;
    border-bottom: 1px solid var(--border-color);
  }
  .act-col-header.fun { background: rgba(52,211,153,0.08); color: var(--accent-green); }
  .act-col-header.study { background: rgba(96,165,250,0.08); color: var(--accent-blue); }
  .act-col-header.work { background: rgba(251,146,60,0.08); color: var(--accent-orange); }
  .act-col-body {
    padding: 4px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    max-height: 300px;
    overflow-y: auto;
  }
  .act-col-body::-webkit-scrollbar { width: 2px; }
  .act-col-body::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 2px; }
  .act-item {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 5px 6px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid transparent;
  }
  .act-item:hover { background: rgba(246,197,71,0.06); border-color: rgba(246,197,71,0.2); }
  .act-item:active { transform: scale(0.97); }
  .act-item.locked { opacity: 0.25; cursor: not-allowed; }
  .act-item.locked:hover { background: none; border-color: transparent; }
  .act-item-emoji { font-size: 16px; flex-shrink: 0; }
  .act-item-info { flex: 1; min-width: 0; }
  .act-item-name { font-size: 10px; font-weight: 600; }
  .act-item-desc { font-size: 8px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .act-item-lock { font-size: 7px; color: var(--accent-orange); }

  /* === Bottom Section === */
  .bottom-section {
    background: var(--bg-secondary);
    border-radius: 10px;
    border: 1px solid var(--border-color);
    padding: 8px;
  }
  .week-slots {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 6px;
  }
  .week-slot {
    background: var(--bg-card);
    border-radius: 6px;
    padding: 4px 2px;
    text-align: center;
    border: 2px dashed rgba(255,255,255,0.08);
    cursor: pointer;
    min-height: 50px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .week-slot:hover { border-color: var(--accent-gold); }
  .week-slot.filled {
    border-style: solid;
    border-color: var(--accent-gold);
    background: rgba(246,197,71,0.05);
    cursor: pointer;
  }
  .week-slot.filled.intern-locked {
    border-color: var(--accent-orange);
    background: rgba(251,146,60,0.05);
    cursor: default;
  }
  .week-slot-label { font-size: 8px; color: var(--text-muted); }
  .week-slot-content { font-size: 16px; }
  .week-slot-name { font-size: 7px; color: var(--text-secondary); }
  .week-slot .remove-btn { font-size: 7px; color: var(--accent-red); opacity: 0; transition: opacity 0.2s; }
  .week-slot.filled:hover .remove-btn { opacity: 0.8; }

  .btn-confirm {
    width: 100%;
    padding: 8px;
    font-size: 13px;
    font-weight: 700;
    border: none;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--accent-gold), var(--accent-orange));
    color: #000;
    cursor: pointer;
    transition: all 0.3s;
  }
  .btn-confirm:hover { box-shadow: 0 4px 20px rgba(246,197,71,0.3); }
  .btn-confirm:disabled { opacity: 0.3; cursor: not-allowed; box-shadow: none; }

  .btn-secondary {
    padding: 8px 20px;
    font-size: 13px;
    font-weight: 500;
    border: 1px solid var(--border-color);
    border-radius: 20px;
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.3s;
  }
  .btn-secondary:hover { border-color: var(--text-secondary); color: var(--text-primary); }

  .effect-tag {
    font-size: 9px;
    padding: 1px 4px;
    border-radius: 4px;
    font-weight: 500;
  }
  .effect-tag.positive { background: rgba(52,211,153,0.15); color: var(--accent-green); }
  .effect-tag.negative { background: rgba(248,113,113,0.15); color: var(--accent-red); }

  /* === Event Modal === */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(6px);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.active { display: flex; }

  .modal-content {
    background: var(--bg-secondary);
    border-radius: 24px;
    padding: 40px;
    max-width: 520px;
    width: 90%;
    border: 1px solid var(--border-color);
    text-align: center;
    animation: fadeIn 0.4s ease;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  .modal-emoji { font-size: 64px; margin-bottom: 16px; }
  .modal-title {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 12px;
    background: linear-gradient(135deg, var(--accent-gold), var(--accent-pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .modal-desc {
    color: var(--text-secondary);
    font-size: 14px;
    line-height: 1.8;
    margin-bottom: 24px;
  }
  .modal-result {
    padding: 14px;
    border-radius: 12px;
    margin-bottom: 20px;
    font-weight: 600;
  }
  .modal-result.success { background: rgba(52,211,153,0.1); color: var(--accent-green); border: 1px solid rgba(52,211,153,0.2); }
  .modal-result.fail { background: rgba(248,113,113,0.1); color: var(--accent-red); border: 1px solid rgba(248,113,113,0.2); }

  .btn-modal {
    padding: 12px 40px;
    font-size: 15px;
    font-weight: 600;
    border: none;
    border-radius: 30px;
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
    color: #fff;
    cursor: pointer;
    transition: all 0.3s ease;
  }
  .btn-modal:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(96,165,250,0.3); }

  /* === Ending Screen === */
  .ending-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 90vh;
    text-align: center;
  }

  .ending-type {
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: 10px;
  }
  .ending-type.good { color: var(--accent-gold); }
  .ending-type.normal { color: var(--accent-blue); }
  .ending-type.bad { color: var(--accent-red); }

  .ending-emoji {
    font-size: 80px;
    margin-bottom: 16px;
    animation: float 3s ease-in-out infinite;
  }

  .ending-title {
    font-size: 36px;
    font-weight: 900;
    margin-bottom: 20px;
    line-height: 1.3;
  }

  .ending-desc {
    max-width: 520px;
    color: var(--text-secondary);
    font-size: 16px;
    line-height: 2;
    margin-bottom: 40px;
  }

  .ending-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 40px;
    max-width: 400px;
    width: 100%;
  }

  .ending-stat {
    background: var(--bg-card);
    border-radius: 12px;
    padding: 14px;
    border: 1px solid var(--border-color);
  }

  .ending-stat-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
  .ending-stat-value { font-size: 20px; font-weight: 700; }

  .btn-restart {
    padding: 14px 50px;
    font-size: 16px;
    font-weight: 600;
    border: 2px solid var(--accent-gold);
    border-radius: 30px;
    background: transparent;
    color: var(--accent-gold);
    cursor: pointer;
    transition: all 0.3s ease;
    letter-spacing: 1px;
  }
  .btn-restart:hover {
    background: var(--accent-gold);
    color: #000;
  }

  /* === Progress Bar === */
  .progress-section {
    margin-bottom: 20px;
  }

  .progress-bar-container {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .progress-label {
    font-size: 12px;
    color: var(--text-muted);
    min-width: 80px;
  }

  .progress-track {
    flex: 1;
    height: 8px;
    background: rgba(255,255,255,0.06);
    border-radius: 8px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    border-radius: 8px;
    background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
    transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
  }

  .progress-text {
    font-size: 12px;
    color: var(--text-secondary);
    min-width: 60px;
    text-align: right;
  }

  /* === Week Summary Flyout === */
  .week-summary {
    background: var(--bg-card);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
    border: 1px solid var(--border-color);
    animation: slideIn 0.4s ease;
  }

  .week-summary h3 {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 10px;
    color: var(--accent-gold);
  }

  .summary-item {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    font-size: 13px;
    color: var(--text-secondary);
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .summary-item:last-child { border-bottom: none; }

  /* === Toast === */
  .toast-container {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 200;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .toast {
    padding: 12px 20px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 500;
    animation: slideIn 0.3s ease;
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
  }

  .toast.info { background: rgba(96,165,250,0.15); color: var(--accent-blue); border: 1px solid rgba(96,165,250,0.3); }
  .toast.success { background: rgba(52,211,153,0.15); color: var(--accent-green); border: 1px solid rgba(52,211,153,0.3); }
  .toast.warning { background: rgba(251,146,60,0.15); color: var(--accent-orange); border: 1px solid rgba(251,146,60,0.3); }
  .toast.danger { background: rgba(248,113,113,0.15); color: var(--accent-red); border: 1px solid rgba(248,113,113,0.3); }

  /* === Responsive === */

  /* 手机上hover不生效，数值默认展开 */
  @media (hover: none) {
  }

  @media (max-width: 768px) {
    #app { padding: 8px; max-width: 100%; }
    .title-main { font-size: 28px; letter-spacing: 2px; }
    .title-sub { font-size: 14px; }
    .title-desc { font-size: 13px; }
    .btn-start { padding: 14px 40px; font-size: 16px; }
    .ending-title { font-size: 22px; }
    .ending-desc { font-size: 14px; }

    /* Top bar compact */
    .game-topbar { padding: 6px 10px; flex-wrap: wrap; gap: 4px; }
    .topbar-time { font-size: 13px; }
    .topbar-badges { gap: 4px; }
    .topbar-badge { font-size: 10px; padding: 2px 6px; }

    /* Game body: stack vertically */
    .game-body {
      flex-direction: column;
      gap: 6px;
    }

    /* Side stats: horizontal row on mobile */
    .side-stats {
      width: 100%;
      flex-direction: row;
      flex-wrap: wrap;
      gap: 4px 8px;
      padding: 8px;
    }
    .side-stat {
      flex: 1;
      min-width: 70px;
    }
    .side-stat-header { gap: 2px; }
    .side-stat-label { font-size: 8px; }
    .side-stat-label span { font-size: 9px; }
    .side-stat-val { font-size: 9px; }
    .side-stat-bar { height: 3px; }

    /* Activities: still 3 columns but tighter */
    .center-activities { gap: 4px; }
    .act-col-header { padding: 4px 6px; font-size: 10px; }
    .act-col-body { padding: 3px; max-height: 220px; }
    .act-item { padding: 4px 5px; gap: 4px; }
    .act-item-emoji { font-size: 14px; }
    .act-item-name { font-size: 9px; }
    .act-item-desc { font-size: 7px; }
    .act-item-lock { font-size: 6px; }

    /* Week slots */
    .week-slots { gap: 3px; }
    .week-slot { min-height: 44px; padding: 3px 1px; }
    .week-slot-label { font-size: 7px; }
    .week-slot-content { font-size: 14px; }
    .week-slot-name { font-size: 6px; }

    /* Bottom */
    .bottom-section { padding: 6px; }
    .btn-confirm { padding: 8px; font-size: 12px; }

    /* Warnings */
    .stress-warning { font-size: 11px; padding: 6px 10px; }

    /* Week log */
    .week-log { padding: 8px; }
    .week-log-title { font-size: 11px; }
    .log-entry { font-size: 10px; }

    /* Modals */
    .modal-content { padding: 24px 16px; }
    .modal-emoji { font-size: 48px; }
    .modal-title { font-size: 18px; }
    .modal-desc { font-size: 13px; }

    /* Ending */
    .ending-stats { grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .ending-stat { padding: 8px; }
    .ending-stat-value { font-size: 16px; }

    /* Collection button */
    .btn-collection { width: 40px; height: 40px; font-size: 18px; bottom: 12px; left: 12px; }
  }

  @media (max-width: 400px) {
    /* Very small phones */
    .center-activities { grid-template-columns: 1fr 1fr 1fr; }
    .act-item-desc { display: none; }
    .side-stat { min-width: 60px; }
  }

  /* === Locked Activity === */
  .activity-card.locked {
    opacity: 0.35;
    pointer-events: none;
    position: relative;
  }

  .activity-card.locked::after {
    content: '🔒';
    position: absolute;
    top: 10px;
    right: 10px;
    font-size: 16px;
  }

  .lock-hint {
    font-size: 10px;
    color: var(--accent-orange);
    margin-top: 6px;
    font-style: italic;
  }

  .activity-card .select-count {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--accent-gold);
    color: #000;

function T(text) {
  if (currentLang === 'zh') return text;
  const entry = I18N[text];
  return entry && entry[currentLang] ? entry[currentLang] : text;
}

function getSN() {
  return currentLang === 'en'
    ? { iq:'IQ', eq:'EQ', skill:'Skill', money:'$', stress:'Stress', lang:'Lang' }
    : { iq:'智商', eq:'情商', skill:'技能', money:'金钱', stress:'压力', lang:'语言' };
}

function switchLang(lang) {
  currentLang = lang;
  localStorage.setItem('hk_sim_lang', lang);
  updateLangButtons();
  // Re-render all screens
  renderTitleScreen();
  renderIntroScreen();
  const gameScreen = document.getElementById('screen-game');
  if (gameScreen.classList.contains('active')) {
    renderAll();
  }
}

function updateLangButtons() {
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === currentLang);
  });
}

function checkUnlock(activityId) {
  const rule = UNLOCK_RULES[activityId];
  if (!rule) return { locked: false, hint: '' };
  return rule(gameState);
}

// ===================== GAME LOGIC =====================

function initGame() {
  gameState = {
    week: 1,
    stats: { iq: 30, eq: 30, skill: 20, money: 50, stress: 20, lang: 10 },
    weekSlots: [],
    flags: { gotJobOffer: false, becameInfluencer: false, wonHorseRace: false, gotMarried: false, discoveredStock: false, goneWild: false },
    history: [],
    portfolio: 0,
    aiClassCount: 0,      // AI课程次数追踪
    friends: 0,           // 朋友数量
    gpa: 0,               // GPA点数（内部值，显示时÷100）
    gpaCredits: 0,        // 已修学分（用于计算GPA）
    interning: false,     // 是否已接受实习offer
    _activeSlot: null,    // 当前正在选择的slot索引
    unlockedIds: new Set() // 已通知解锁的活动ID
  };
}

function startGame() {
  initGame();
  switchScreen('screen-intro');
}

function showGameScreen() {
  switchScreen('screen-game');
  document.getElementById('btn-collection').style.display = 'flex';
  updateCollectionBadge();
  renderAll();
  // Show tutorial on first week
  if (gameState.week === 1) {
    setTimeout(() => showTutorial(), 500);
  }
}

function switchScreen(screenId) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(screenId).classList.add('active');
}

function renderAll() {
  if (gameState.interning) fillInternSlots();
  renderTopBar();
  renderSideStats();
  renderCenterActivities();
  renderWeekSlots();
  renderWeekLog();
  checkStressWarning();
  updateConfirmButton();
  checkNewUnlocks();
}

function renderTopBar() {
  const month = Math.ceil(gameState.week / 4);
  const weekInMonth = ((gameState.week - 1) % 4) + 1;
  document.getElementById('current-time').textContent = currentLang === 'zh' ? `第${month}月 第${weekInMonth}周` : `M${month} W${weekInMonth}`;
  document.getElementById('total-progress').textContent = `${gameState.week - 1}/${GAME_CONFIG.totalWeeks}${T('周')}`;

  const s = gameState.stats;
  const gpaDisplay = gameState.gpaCredits > 0 ? Math.min(4.0, gameState.gpa / gameState.gpaCredits).toFixed(1) : '0.0';
  const internTag = gameState.interning ? `<span class="topbar-badge" style="border-color:var(--accent-orange);color:var(--accent-orange)">👔${T('实习中')}</span>` : '';

  // 只显示图标，不显示数字
  document.getElementById('topbar-badges').innerHTML = `
    <span class="topbar-badge">💰</span>
    <span class="topbar-badge" style="${s.stress >= 80 ? 'color:var(--accent-red);border-color:var(--accent-red)' : ''}">😰${s.stress >= 80 ? '⚠️' : ''}</span>

  const s = gameState.stats;

    { icon:'🧠', name:'智商', val:s.iq, max:200, color:'var(--accent-blue)' },
    { icon:'💖', name:'情商', val:s.eq, max:200, color:'var(--accent-pink)' },

    { icon:'💰', name:'金钱', val:s.money, max:200, color:'var(--accent-gold)' },

    { icon:'🗣️', name:'语言', val:s.lang, max:200, color:'var(--accent-green)' },
    { icon:'👫', name:'朋友', val:gameState.friends, max:20, color:'#818cf8' },

// 渲染本周7个时间格
function renderWeekSlots() {
  const container = document.getElementById('week-slots');
  const dayNames = ['一', '二', '三', '四', '五', '六', '日'];

  container.innerHTML = dayNames.map((day, i) => {
    const slot = gameState.weekSlots[i];
    if (slot) {
      const isLockedIntern = slot.locked && slot.id === 'intern';
      return `
        <div class="week-slot filled ${isLockedIntern ? 'intern-locked' : ''}" ${!isLockedIntern ? `onclick="removeSlot(${i})"` : ''}>
          <div class="week-slot-label">${T(day)}</div>
          <div class="week-slot-content">${slot.emoji}</div>
          <div class="week-slot-name">${T(slot.name)}</div>
          ${isLockedIntern ? '<div style="font-size:7px;color:var(--accent-orange)">📌</div>' : '<div class="remove-btn">✕</div>'}
        </div>
      `;
    }
    return `
      <div class="week-slot">
        <div class="week-slot-label">${T(day)}</div>
        <div class="week-slot-content" style="color:var(--text-muted);font-size:14px">+</div>
      </div>
    `;
  }).join('');
}

function removeSlot(index) {
  const slot = gameState.weekSlots[index];
  if (slot && slot.locked) { showToast('📌 实习日不能移除', 'warning'); return; }
  if (slot && slot.id === 'intern' && gameState.interning) {
    if (gameState.weekSlots.filter(s => s.id === 'intern').length <= 4) {
      showToast('📌 实习不能少于4天', 'warning'); return;
    }
  }
  gameState.weekSlots.splice(index, 1);
  renderAll();
}

// 点击活动直接添加到课表（面板常驻不消失）
function pickActivity(activityId) {
  if (gameState.weekSlots.length >= GAME_CONFIG.slotsPerWeek) {
    showToast('本周已排满！', 'warning');
    return;
  }
  if (activityId === 'intern' && !gameState.interning) {
    showInternOffer();
    return;
  }
  const activity = findActivity(activityId);
  if (!activity) return;
  gameState.weekSlots.push({ id: activity.id, emoji: activity.emoji, name: activity.name, locked: false });
  showToast(`${activity.emoji} ${activity.name}`, 'info');
  renderAll();
}

function fillInternSlots() {
  const intern = findActivity('intern');
  if (!intern) return;

  // 计算当前已有的实习slot数量
  const currentInternCount = gameState.weekSlots.filter(s => s.id === 'intern').length;
  const needed = 4 - currentInternCount;

  for (let i = 0; i < needed; i++) {
    if (gameState.weekSlots.length < GAME_CONFIG.slotsPerWeek) {
      gameState.weekSlots.push({ id: intern.id, emoji: intern.emoji, name: intern.name, locked: true });
    }
  }
}

function renderWeekLog() {
  const logDiv = document.getElementById('week-log');
  const entriesDiv = document.getElementById('log-entries');

  if (gameState.history.length === 0) {
    logDiv.style.display = 'none';
    return;
  }

  logDiv.style.display = 'block';
  document.querySelector('.week-log-title').textContent = currentLang === 'en' ? '📋 Last Week' : '📋 上周';
  const lastWeek = gameState.history.filter(h => h.week === gameState.week - 1);
  const items = lastWeek.length > 0 ? lastWeek : gameState.history.slice(-7);
  entriesDiv.innerHTML = items.map(h =>
    `<span class="log-entry">${h.emoji} ${T(h.name)}</span>`
  ).join('');

function checkStressWarning() {
  const warning = document.getElementById('stress-warning');
  if (gameState.stats.stress >= GAME_CONFIG.stressThreshold) {
    warning.style.display = 'flex';
    warning.textContent = currentLang === 'en' ? '⚠️ Stress too high! Arrange some fun activities!' : '⚠️ 压力值过高！请安排一些娱乐活动来放松一下！';
  } else {
    warning.style.display = 'none';
  }

  // GPA warning - 持续显示，不只是考核前
  const gpaWarning = document.getElementById('gpa-warning');
  const checkpoints = [
    { week: 7, minGpa: 1.5, minCredits: 5 },
    { week: 14, minGpa: 2.0, minCredits: 12 },
    { week: 20, minGpa: 2.0, minCredits: 18 }
  ];
  const nextCP = checkpoints.find(c => c.week >= gameState.week);
  if (nextCP) {
    const weeksLeft = nextCP.week - gameState.week;
    const currentGpa = gameState.gpaCredits > 0 ? (gameState.gpa / gameState.gpaCredits).toFixed(1) : '0.0';
    const gpaOk = parseFloat(currentGpa) >= nextCP.minGpa;
    const creditsOk = gameState.gpaCredits >= nextCP.minCredits;
    const creditsNeeded = nextCP.minCredits - gameState.gpaCredits;

    if (!gpaOk || !creditsOk) {
      // 不达标就一直显示，越近越紧急
      gpaWarning.style.display = 'flex';
      gpaWarning.style.animation = weeksLeft <= 2 ? 'pulse 1.5s ease infinite' : 'none';
      gpaWarning.style.borderColor = weeksLeft <= 2 ? 'rgba(248,113,113,0.4)' : 'rgba(251,191,36,0.3)';
      gpaWarning.style.color = weeksLeft <= 2 ? 'var(--accent-red)' : '#fbbf24';
      gpaWarning.style.background = weeksLeft <= 2 ? 'rgba(248,113,113,0.1)' : 'rgba(251,191,36,0.1)';

      let msg;
      if (currentLang === 'en') {
        msg = `📊 GPA Check: <strong>${weeksLeft}</strong> weeks left!`;
        if (!creditsOk) msg += ` Need <strong>${creditsNeeded}</strong> more classes!`;
        if (!gpaOk) msg += ` GPA needs ≥${nextCP.minGpa} (now ${currentGpa})`;
        msg += ' — <strong>Take classes!</strong>';
      } else {
        msg = `📊 GPA考核：还有 <strong>${weeksLeft}</strong> 周！`;
        if (!creditsOk) msg += ` 还需上 <strong>${creditsNeeded}</strong> 门课！`;
        if (!gpaOk) msg += ` GPA需≥${nextCP.minGpa}（当前 ${currentGpa}）`;
        msg += ' — <strong>记得安排上课！</strong>';
      }
      gpaWarning.innerHTML = msg;
    } else {
      // 达标了就不显示
      gpaWarning.style.display = 'none';
    }
  } else {
    gpaWarning.style.display = 'none';
  }
}

function updateConfirmButton() {
  const btn = document.getElementById('btn-confirm');
  const count = gameState.weekSlots.length;
  btn.disabled = count === 0;
  if (count === GAME_CONFIG.slotsPerWeek) {
    btn.textContent = `✅ ${T('确认本周安排')} (${count}/${GAME_CONFIG.slotsPerWeek})`;
  } else if (count > 0) {
    btn.textContent = `⏩ ${T('确认本周安排')} (${count}/${GAME_CONFIG.slotsPerWeek})`;
  } else {
    btn.textContent = currentLang === 'zh' ? '请选择本周活动' : 'Pick activities';
  }
}

function findActivity(id) {
  for (const cat of Object.values(ACTIVITIES)) {
    const found = cat.items.find(i => i.id === id);
    if (found) return found;
  }
  return null;
}

function applyEffects(effects) {
  for (const [key, val] of Object.entries(effects)) {
    const cap = key === 'stress' ? 100 : 999;
    gameState.stats[key] = Math.max(0, Math.min(cap, gameState.stats[key] + val));
  }
}

function confirmWeek() {
  if (gameState.weekSlots.length === 0) return;

  // Snapshot stats before
  const before = { ...gameState.stats };

  // Apply all slot effects
  const weekActivities = [];
  const slotIds = [];
  gameState.weekSlots.forEach(slot => {
    const activity = findActivity(slot.id);
    if (activity) {
      applyEffects(activity.effects);
      weekActivities.push({ emoji: slot.emoji, name: slot.name });
      slotIds.push(slot.id);
      gameState.history.push({ emoji: slot.emoji, name: slot.name, week: gameState.week });

      if (slot.id === 'portfolio') gameState.portfolio++;
      if (slot.id === 'ai_class') gameState.aiClassCount++;
      // 交朋友：上课和小组作业能认识同学
      if (['trad_class','ai_class','lang_class','group_work','event_pt'].includes(slot.id)) {
        gameState.friends++;
      }
      // GPA追踪：不同课程GPA贡献不同
      // 传统课: GPA加得多(3.5)，AI课中等(3.0)，语言课(2.8)，小组作业(3.2)，毕业项目(3.3)，改作品集(2.5)
      const GPA_MAP = {
        'trad_class': 3.5,
        'ai_class': 3.0,
        'lang_class': 2.8,
        'group_work': 3.2,
        'thesis': 3.3,
        'portfolio': 2.5
      };
      if (GPA_MAP[slot.id] !== undefined) {
        gameState.gpa += GPA_MAP[slot.id];
        gameState.gpaCredits += 1;
      }
    }
  });

  // Calculate changes
  const changes = {};
  const statNames = { iq:'智商', eq:'情商', skill:'技能', money:'金钱', stress:'压力', lang:'语言' };
  for (const key of Object.keys(before)) {
    const diff = gameState.stats[key] - before[key];
    if (diff !== 0) changes[key] = diff;
  }

  // Count categories this week
  const funItems = new Set(ACTIVITIES.fun.items.map(i => i.id));
  const studyItems = new Set(ACTIVITIES.study.items.map(i => i.id));
  const workItems = new Set(ACTIVITIES.work.items.map(i => i.id));

  const funCount = slotIds.filter(id => funItems.has(id)).length;
  const studyCount = slotIds.filter(id => studyItems.has(id)).length;
  const workCount = slotIds.filter(id => workItems.has(id)).length;

  // Save for summary
  const summaryData = { weekActivities, changes, funCount, studyCount, workCount, slotIds };

  // Clear slots
  gameState.weekSlots = [];

  // Check stress burnout
  if (gameState.stats.stress >= 100) {
    setTimeout(() => showEnding('burnout'), 800);
    return;
  }

  // Show weekly summary first, then check random event / advance
  showWeeklySummary(summaryData);
}

function closeSummaryModal() {
  document.getElementById('summary-modal').classList.remove('active');

  // Now check random event
  if (Math.random() < GAME_CONFIG.randomEventChance) {
    const eligible = RANDOM_EVENTS.filter(e => {
      // Check condition
      if (!e.condition(gameState.stats)) return false;
      // Check if all flags in this event's choices are already triggered
      const eventFlags = e.choices.filter(c => c.flag).map(c => c.flag);
      if (eventFlags.length > 0 && eventFlags.every(f => gameState.flags[f])) return false;
      return true;
    });
    if (eligible.length > 0) {
      const event = eligible[Math.floor(Math.random() * eligible.length)];
      setTimeout(() => triggerRandomEvent(event), 400);
      return;
    }
  }

  advanceWeek();
}

function advanceWeek() {
  gameState.week++;

  // GPA阶段考核检查点
  const GPA_CHECKPOINTS = [
    { week: 7, name: '第一阶段（期中考核）', minGpa: 1.5, minCredits: 5 },
    { week: 14, name: '第二阶段（期末考核）', minGpa: 2.0, minCredits: 12 },
    { week: 20, name: '第三阶段（毕业考核）', minGpa: 2.0, minCredits: 18 }
  ];

  const checkpoint = GPA_CHECKPOINTS.find(c => c.week === gameState.week);
  if (checkpoint) {
    const currentGpa = gameState.gpaCredits > 0 ? gameState.gpa / gameState.gpaCredits : 0;
    if (currentGpa < checkpoint.minGpa || gameState.gpaCredits < checkpoint.minCredits) {
      // GPA不达标
      setTimeout(() => showGpaWarning(checkpoint, currentGpa), 500);
      return;
    } else {
      // 通过考核
      showToast(`✅ ${checkpoint.name}通过！GPA: ${currentGpa.toFixed(1)} 🎉`, 'success');
    }
  }

  if (gameState.week > GAME_CONFIG.totalWeeks) {
    setTimeout(() => calculateEnding(), 500);
    return;
  }

  renderAll();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showGpaWarning(checkpoint, currentGpa) {
  const modal = document.getElementById('event-modal');
  const content = document.getElementById('modal-content');
  const creditsNeeded = checkpoint.minCredits;
  const hasEnoughCredits = gameState.gpaCredits >= creditsNeeded;

  let failReason = '';
  if (!hasEnoughCredits) {
    failReason = `你只修了 ${gameState.gpaCredits} 门课（需要至少 ${creditsNeeded} 门）。\n你上课太少了！`;
  } else {
    failReason = `你的GPA只有 ${currentGpa.toFixed(2)}（需要 ${checkpoint.minGpa.toFixed(1)}）。\n成绩不够好！`;
  }

  content.innerHTML = `
    <div class="modal-emoji">📉</div>
    <div class="modal-title">⚠️ ${checkpoint.name}</div>
    <div class="modal-title" style="font-size:18px;color:var(--accent-red)">GPA未达标！</div>
    <div class="modal-desc" style="line-height:1.8">
      ${failReason.replace(/\n/g, '<br>')}<br><br>
      <span style="color:var(--text-muted)">
        当前GPA: <strong style="color:var(--accent-red)">${currentGpa.toFixed(2)}</strong> / 需要: <strong>${checkpoint.minGpa.toFixed(1)}</strong><br>
        已修学分: <strong style="${!hasEnoughCredits ? 'color:var(--accent-red)' : ''}">${gameState.gpaCredits}</strong> / 需要: <strong>${creditsNeeded}</strong>
      </span>
    </div>
    <button class="btn-modal" onclick="document.getElementById('event-modal').classList.remove('active');showEnding('expelled')" style="background:linear-gradient(135deg,var(--accent-red),var(--accent-orange))">
      😢 接受现实
    </button>
  `;

  modal.classList.add('active');
}

function triggerRandomEvent(event) {
  const modal = document.getElementById('event-modal');
  const content = document.getElementById('modal-content');

  // Store current event for choice handler
  gameState._currentEvent = event;

  content.innerHTML = `
    <div class="modal-emoji">${event.emoji}</div>
    <div class="modal-title">⚡ 随机事件！</div>
    <div class="modal-title" style="font-size:20px">${event.title}</div>
    <div class="modal-desc">${event.desc}</div>
    <div style="display:flex;flex-direction:column;gap:10px;margin-top:8px">
      ${event.choices.map((c, i) => {
        return `
          <div style="background:var(--bg-card);border:1px solid var(--border-color);border-radius:12px;padding:14px;cursor:pointer;transition:all 0.2s;text-align:left"
               onmouseover="this.style.borderColor='var(--accent-gold)';this.style.background='rgba(246,197,71,0.05)'"
               onmouseout="this.style.borderColor='var(--border-color)';this.style.background='var(--bg-card)'"
               onclick="chooseEventOption(${i})">
            <div style="font-size:14px;font-weight:600;margin-bottom:4px">${c.label}</div>
            <div style="font-size:12px;color:var(--text-muted)">${c.desc}</div>
            ${c.flagChance > 0 ? '<div style="font-size:10px;color:var(--accent-gold);margin-top:4px">✨ 可能有意想不到的事发生...</div>' : ''}
          </div>
        `;
      }).join('')}
    </div>
  `;

  modal.classList.add('active');
}

function chooseEventOption(choiceIndex) {
  const event = gameState._currentEvent;
  if (!event) return;

  const choice = event.choices[choiceIndex];
  const modal = document.getElementById('event-modal');
  const content = document.getElementById('modal-content');
  const statNames = {iq:'智商',eq:'情商',skill:'技能',money:'金钱',stress:'压力',lang:'语言'};

  // Apply effects
  if (choice.effects && Object.keys(choice.effects).length > 0) {
    applyEffects(choice.effects);
  }

  // Check for flag trigger (5% chance)
  let flagTriggered = false;
  if (choice.flagChance > 0 && choice.flag && Math.random() < choice.flagChance) {
    gameState.flags[choice.flag] = true;
    flagTriggered = true;
  }

  // Show result
  const effectsHtml = Object.entries(choice.effects || {}).length > 0
    ? Object.entries(choice.effects).map(([k,v]) => {
        return `<span style="margin:0 4px;">${statNames[k]||k} ${v>0?'+':''}${v}</span>`;
      }).join(' ')
    : '';

  content.innerHTML = `
    <div class="modal-emoji">${event.emoji}</div>
    <div class="modal-title" style="font-size:18px">${event.title}</div>
    <div style="margin:12px 0;font-size:14px;color:var(--text-secondary)">你选择了：<strong>${choice.label}</strong></div>
    ${flagTriggered ? `
      <div class="modal-result success" style="font-size:15px;line-height:1.7">
        ${choice.flagText}
      </div>
    ` : `
      <div class="modal-result ${Object.values(choice.effects || {}).some(v => v > 0) ? 'success' : Object.values(choice.effects || {}).some(v => v < 0) ? 'fail' : 'success'}">
        ${choice.desc}
      </div>
    `}
    ${effectsHtml ? `<div style="margin-bottom:16px;font-size:13px;color:var(--text-muted)">${effectsHtml}</div>` : ''}
    <button class="btn-modal" onclick="closeEventModal()">继续</button>
  `;

  // Clean up
  gameState._currentEvent = null;
}

  const specialEndingMap = {
    wonHorseRace: { id: 'billionaire', emoji: '💰', title: '百亿富翁' },
    gotMarried: { id: 'marriage', emoji: '💍', title: '港式婚绿' },

function calculateEnding() {
  const s = gameState.stats;
  const f = gameState.flags;

  const mediaCount = gameState.history.filter(h => h.name === '做自媒体').length;
  const nightclubCount = gameState.history.filter(h => h.name === '夜店兼职').length;
  const startupCount = gameState.history.filter(h => h.name === '搞创业').length;
  const mcdCount = gameState.history.filter(h => h.name === '做麦当劳打工').length;
  const aiCount = gameState.aiClassCount;

  // === 隐藏结局优先判定 ===

  // AI统治世界线：压力高 + 大量AI课程
  if (s.stress >= 70 && aiCount >= 12) {
    showEnding('ai_overlord');
    return;
  }

  // === 夜总会线 ===
  if (nightclubCount >= 12) {
    if (s.eq >= 70 && s.money >= 60) {
      showEnding('nightclub_good');
    } else if (s.eq >= 50 || s.money >= 50) {
      showEnding('nightclub_normal');
    } else {
      showEnding('nightclub_bad');
    }
    return;
  }

  // === 创业线 ===
  if (startupCount >= 10) {
    if (s.skill >= 70 && s.iq >= 60 && s.money >= 30) {
      showEnding('startup_good');
    } else if (s.skill >= 50 || s.iq >= 50) {
      showEnding('startup_normal');
    } else {
      showEnding('startup_bad');
    }
    return;
  }

  // === 麦当劳线 ===
  if (mcdCount >= 15) {
    if (s.skill >= 60 && s.iq >= 50 && s.money >= 40) {
      showEnding('mcd_good');
    } else if (s.skill >= 40 || s.lang >= 50) {
      showEnding('mcd_normal');
    } else {
      showEnding('mcd_bad');
    }
    return;
  }

  // === 网红线 ===
  if (f.becameInfluencer || mediaCount >= 16) {
    if (f.becameInfluencer && (s.eq >= 60 || s.skill >= 60)) {
      showEnding('influencer_good');
    } else if (mediaCount >= 10 && s.skill >= 40) {
      showEnding('influencer_normal');
    } else {
      showEnding('influencer_bad');
    }
    return;
  }

  // === 打工人线 ===
  if (s.lang >= 60 && s.eq >= 50) {
    showEnding('work_good2');
  } else if (f.gotJobOffer || (s.skill >= 70 && s.iq >= 60)) {
    showEnding('work_good');
  } else if (s.skill >= 45 || s.iq >= 45) {
    showEnding('work_normal');
  } else {
    showEnding('work_bad');
  }
}

// ===================== UNLOCK NOTIFICATION =====================

let pendingUnlocks = []; // Queue of newly unlocked activities

function checkNewUnlocks() {
  // Check all activities with unlock rules
  for (const [actId, rule] of Object.entries(UNLOCK_RULES)) {
    const result = rule(gameState);
    if (!result.locked && !gameState.unlockedIds.has(actId)) {
      // Newly unlocked!
      gameState.unlockedIds.add(actId);
      // Find activity info
      const activity = findActivity(actId);
      if (activity) {
        pendingUnlocks.push(activity);
      }
    }
  }

  // Show first pending unlock if no other modal is open
  if (pendingUnlocks.length > 0 && !isAnyModalOpen()) {
    setTimeout(() => showNextUnlock(), 300);
  }
}

function isAnyModalOpen() {
  return document.getElementById('tutorial-modal').classList.contains('active') ||
         document.getElementById('event-modal').classList.contains('active') ||
         document.getElementById('summary-modal').classList.contains('active') ||
         document.getElementById('unlock-modal').classList.contains('active') ||

// ===================== COLLECTION SYSTEM =====================

const COLLECTION_STORAGE_KEY = 'hk_master_sim_collection';

function getCollection() {
  try {
    const data = localStorage.getItem(COLLECTION_STORAGE_KEY);
    return data ? JSON.parse(data) : [];
  } catch { return []; }
}

function saveEndingToCollection(endingId) {
  const collection = getCollection();
  if (!collection.includes(endingId)) {
    collection.push(endingId);
    localStorage.setItem(COLLECTION_STORAGE_KEY, JSON.stringify(collection));
  }
}

function updateCollectionBadge() {
  const count = getCollection().length;
  const badge = document.getElementById('collection-count');
  if (badge) {
    badge.textContent = count;
    badge.style.display = count > 0 ? 'flex' : 'none';
  }
}

function showCollection() {
  const collection = getCollection();
  const total = Object.keys(ENDINGS).length;
  const isEn = currentLang === 'en';
  const allEndings = Object.entries(ENDINGS);

  // Group by line (use translated line names)
  const groups = {};
  allEndings.forEach(([id, e]) => {
    const en = ENDINGS_EN[id] || {};
    const line = isEn && en.line ? en.line : (e.line || 'Other');
    if (!groups[line]) groups[line] = [];
    groups[line].push({
      id, ...e,
      title: isEn && en.title ? en.title : e.title,
      line: line,
      unlocked: collection.includes(id)
    });
  });

  const qualityLabels = isEn
    ? { good: 'Good', normal: 'Normal', bad: 'Bad' }
    : { good: '好结局', normal: '普通结局', bad: '坏结局' };

  let html = `
    <div class="collection-header">
      <div style="font-size:40px;margin-bottom:8px">🏆</div>
      <div class="collection-header-title">${isEn ? 'Collection' : '结局收集'}</div>
      <div class="collection-header-sub">${isEn ? `Collected ${collection.length} / ${total} endings` : `已收集 ${collection.length} / ${total} 个结局`}</div>
      <div style="margin-top:10px">
        <div class="progress-track" style="height:6px">
          <div class="progress-fill" style="width:${Math.round(collection.length / total * 100)}%;background:linear-gradient(90deg,var(--accent-gold),var(--accent-pink))"></div>
        </div>
      </div>
    </div>
    <div class="collection-gallery">
  `;

  for (const [line, endings] of Object.entries(groups)) {
    html += `<div style="font-size:13px;font-weight:600;color:var(--text-muted);margin:16px 0 8px;padding-left:4px">${line}</div>`;
    html += `<div class="collection-grid">`;
    endings.forEach(e => {
      if (e.unlocked) {
        html += `
          <div class="collection-card unlocked">
            <div class="collection-card-emoji">${e.emoji}</div>
            <div class="collection-card-title">${e.title}</div>
            <div class="collection-card-line">${e.line}</div>
            <div class="collection-card-quality ${e.quality}">${qualityLabels[e.quality]}</div>
          </div>
        `;
      } else {
        html += `
          <div class="collection-card locked">
            <div class="collection-card-emoji">❓</div>
            <div class="collection-card-title">???</div>
            <div class="collection-card-line">${e.line}</div>
            <div class="collection-card-quality" style="color:var(--text-muted)">${isEn ? 'Locked' : '未解锁'}</div>
          </div>
        `;
      }
    });
    html += `</div>`;
  }

  html += `</div>
    <div style="text-align:center;margin-top:20px">
      <button class="btn-modal" onclick="closeCollection()">${isEn ? 'Close' : '关闭'}</button>
    </div>
  `;

  document.getElementById('collection-content').innerHTML = html;
  document.getElementById('collection-modal').classList.add('active');
}

}

    mcd_normal:       { zh: '🍔 麦当劳打工≥15次 且（💼技能≥40 或 🗣️语言≥50）', en: "🍔 McDonald's≥15 & (Skill≥40 or Lang≥50)" },
    mcd_bad:          { zh: '🍔 麦当劳打工≥15次 且 技能<40 且 语言<50', en: "🍔 McDonald's≥15 & Skill<40 & Lang<50" },
    influencer_good:  { zh: '🎲 随机事件「电影节」成功 且（💖情商≥60 或 💼技能≥60）', en: '🎲 Film Fest success & (EQ≥60 or Skill≥60)' },
    influencer_normal:{ zh: '📱 做自媒体≥10次 且 💼技能≥40', en: '📱 Social Media≥10 & Skill≥40' },
    influencer_bad:   { zh: '📱 做自媒体≥16次 但其他条件不满足', en: '📱 Social Media≥16 but other conditions not met' },
    work_good2:       { zh: '🗣️ 语言≥60 且 💖情商≥50', en: '🗣️ Lang≥60 & EQ≥50' },
    work_good:        { zh: '🎲 游戏酒吧获得Offer，或（💼技能≥70 且 🧠智商≥60）', en: '🎲 Game Bar offer, or (Skill≥70 & IQ≥60)' },
    work_normal:      { zh: '💼 技能≥45 或 🧠智商≥45', en: '💼 Skill≥45 or IQ≥45' },
    work_bad:         { zh: '💼 技能<45 且 🧠智商<45（兜底结局）', en: '💼 Skill<45 & IQ<45 (fallback)' }
  };

  // Group by line
  const groups = {};
  const lineOrder = [];
  allEndings.forEach(([id, e]) => {
    const en = ENDINGS_EN[id] || {};
    const line = isEn && en.line ? en.line : (e.line || 'Other');
    if (!groups[line]) { groups[line] = []; lineOrder.push(line); }
    const cond = CONDITIONS[id] || { zh: '', en: '' };
    groups[line].push({
      id, ...e,
      title: isEn && en.title ? en.title : e.title,
      desc: isEn && en.desc ? en.desc : e.desc,
      line,
      collected: collection.includes(id),
      condition: isEn ? cond.en : cond.zh
    });
  });

  let html = `
    <div class="collection-header">
      <div style="font-size:40px;margin-bottom:8px">📖</div>
      <div class="collection-header-title">${isEn ? 'All Endings' : '结局一览'}</div>
      <div class="collection-header-sub">${isEn ? `All ${allEndings.length} endings · Click to expand` : `全部 ${allEndings.length} 个结局 · 点击展开查看详情`}</div>
    </div>
    <div class="endings-gallery">
  `;

  for (const line of lineOrder) {
    const endings = groups[line];
    html += `<div style="font-size:13px;font-weight:600;color:var(--text-muted);margin:16px 0 8px;padding-left:4px">${line}</div>`;

    endings.forEach(e => {
      const collectedTag = e.collected
        ? `<span style="font-size:10px;background:rgba(52,211,153,0.12);color:var(--accent-green);padding:1px 6px;border-radius:8px;margin-left:6px">✓ ${isEn ? 'Got' : '已收集'}</span>`
        : `<span style="font-size:10px;background:rgba(255,255,255,0.06);color:var(--text-muted);padding:1px 6px;border-radius:8px;margin-left:6px">${isEn ? 'Locked' : '未收集'}</span>`;

      html += `
        <div class="ending-full-card" onclick="toggleEndingCard(this)">
          <div class="ending-full-header">
            <div class="ending-full-emoji">${e.emoji}</div>
            <div class="ending-full-info">
              <div class="ending-full-title">${e.title}${collectedTag}</div>
              <div class="ending-full-meta">
                <span class="ending-full-line">${e.line}</span>
                <span class="ending-full-quality ${e.quality}">${qualityLabels[e.quality]}</span>
              </div>
            </div>
            <div class="ending-full-arrow">▶</div>
          </div>
          <div class="ending-full-body">
            <div style="background:rgba(96,165,250,0.08);border:1px solid rgba(96,165,250,0.15);border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:12px;line-height:1.7">
              <span style="color:var(--accent-blue);font-weight:600">📋 ${isEn ? 'Condition:' : '达成条件：'}</span><br>
              <span style="color:var(--text-secondary)">${e.condition}</span>
            </div>
            ${e.desc.replace(/\n/g, '<br>')}
          </div>
        </div>
      `;
    });
  }

  html += `</div>
    <div style="text-align:center;margin-top:20px">
      <button class="btn-modal" onclick="closeAllEndings()">${isEn ? 'Close' : '关闭'}</button>
    </div>
  `;

  document.getElementById('all-endings-content').innerHTML = html;
  document.getElementById('all-endings-modal').classList.add('active');
}

function toggleEndingCard(card) {
  card.classList.toggle('expanded');
}

function closeAllEndings() {
  document.getElementById('all-endings-modal').classList.remove('active');
}

// Initialize
document.addEventListener('DOMContentLoaded', () => {
  renderTitleScreen();
  renderIntroScreen();
  switchScreen('screen-title');
  updateCollectionBadge();
  updateLangButtons();
});
</script>
</body>
</html>
